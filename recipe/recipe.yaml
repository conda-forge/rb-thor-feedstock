schema_version: 1

context:
  name: thor
  version: 1.3.2

package:
  name: rb-${{ name|lower }}
  version: ${{ version }}

source:
  url: https://rubygems.org/downloads/${{ name }}-${{ version }}.gem
  sha256: eef0293b9e24158ccad7ab383ae83534b7ad4ed99c09f96f1a6b036550abbeda

build:
  number: 1
  noarch: generic
  script:
    - gem install -N -l -V --norc --ignore-dependencies ${{ name }}-${{ version }}.gem
    - gem unpack ${{ name }}-${{ version }}.gem

requirements:
  host:
    - ruby >=2.7,<3
  run:
    - ruby >=2.7,<3

tests:
  - script:
      - ruby -r ${{ name }} -e 'exit 0'

about:
  license: MIT
  license_file: ${{ name }}-${{ version }}/LICENSE.md
  summary: Simple and efficient tool for building self-documenting command line utilities
  homepage: https://rubygems.org/gems/${{ name }}
  repository: https://github.com/erikhuda/${{ name }}
  documentation: https://www.rubydoc.info/gems/${{ name }}

extra:
  recipe-maintainers:
    - sodre
    - Tata17
    - svengiegerich
    - janjagusch
